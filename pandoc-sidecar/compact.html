<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='4' fill='%231a3a5c'/><rect x='7' y='7' width='18' height='2.5' rx='1' fill='white'/><rect x='7' y='12.5' width='18' height='2.5' rx='1' fill='white'/><rect x='7' y='18' width='13' height='2.5' rx='1' fill='white'/><rect x='7' y='23.5' width='9' height='2.5' rx='1' fill='white'/></svg>">
<style>
  body {
    font-family: Segoe UI, Calibri, Arial, sans-serif;
    max-width: 760px;
    margin: 1.5em auto;
    padding: 0 2em;
    line-height: 1.45;
    color: #1a1a1a;
    font-size: 10pt;
  }
  p { margin: 0.4em 0; }
  h1 { font-size: 1.5em; color: #1a3a5c; border-bottom: 2px solid #1a3a5c; padding-bottom: 0.25em; margin-top: 0.8em; margin-bottom: 0.5em; }
  h2 { font-size: 1.2em; color: #1a3a5c; border-bottom: 1px solid #ccc; padding-bottom: 0.15em; margin-top: 1.4em; margin-bottom: 0.4em; }
  h3 { font-size: 1.05em; color: #333; margin-top: 1.0em; margin-bottom: 0.3em; }
  blockquote { border-left: 4px solid #1a3a5c; margin: 0.8em 0; padding: 0.4em 0.8em; background: #f7f9fb; }
  hr { border: none; border-top: 1px solid #ddd; margin: 1.2em 0; }
  code { background: #f4f4f4; padding: 0.15em 0.35em; border-radius: 3px; font-size: 0.87em; }
  pre { background: #f4f4f4; padding: 0.75em 1em; border-radius: 4px; overflow-x: auto; border-left: 3px solid #1a3a5c; position: relative; margin: 0.8em 0; }
  pre code { background: none; padding: 0; font-size: 0.88em; }
  ul, ol { padding-left: 1.4em; margin: 0.3em 0; }
  li { margin-bottom: 0.15em; }
  strong { color: inherit; }
  a { color: #1a5c8e; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .wiki-link-missing { color: #aaa; text-decoration: line-through; cursor: default; }
  img { max-width: 100%; height: auto; display: block; margin: 0.8em auto; }
  kbd {
    display: inline-block; padding: 0.1em 0.4em; font-size: 0.8em;
    font-family: Consolas, monospace; color: #333; background: #f5f5f5;
    border: 1px solid #ccc; border-bottom: 2px solid #aaa; border-radius: 3px; white-space: nowrap;
  }

  /* Tables */
  table { border-collapse: collapse; width: 100%; margin: 0.8em 0; font-size: 0.9em; }
  thead tr { background-color: #1a3a5c; color: white; }
  th { padding: 0.4em 0.75em; text-align: left; font-weight: 600; border: 1px solid #15304d; }
  td { padding: 0.3em 0.75em; border: 1px solid #dde2e8; vertical-align: top; }
  tbody tr:nth-child(even) td { background-color: #f5f8fc; }
  tbody tr:nth-child(odd)  td { background-color: #ffffff; }
  tbody tr:hover td { background-color: #edf2f8; }

  /* Table of contents */
  nav#TOC {
    background: #f7f9fb;
    border: 1px solid #dde2e8;
    border-radius: 4px;
    padding: 0.6em 1em;
    margin-bottom: 1.2em;
    display: inline-block;
    min-width: 200px;
    max-width: 100%;
  }
  nav#TOC > ul { margin: 0; padding-left: 1.1em; }
  nav#TOC ul { list-style: disc; }
  nav#TOC li { margin-bottom: 0.15em; font-size: 0.92em; }
  nav#TOC a { color: #1a5c8e; }
  nav#TOC p { margin: 0 0 0.3em 0; font-weight: 700; font-size: 0.82em; text-transform: uppercase; letter-spacing: 0.06em; color: #555; }

  /* Callout boxes */
  .callout { border-left: 4px solid; padding: 0.4em 0.8em; margin: 0.8em 0; border-radius: 0 4px 4px 0; }
  .callout-title { display: block; font-weight: 700; margin-bottom: 0.2em; font-size: 0.9em; }
  .callout p:last-child { margin-bottom: 0; }
  .callout-note      { border-color: #1a5c8e; background: #f0f6fc; }
  .callout-note      .callout-title { color: #1a5c8e; }
  .callout-tip       { border-color: #2a7a2a; background: #f0faf0; }
  .callout-tip       .callout-title { color: #2a7a2a; }
  .callout-important { border-color: #7a3a9a; background: #f8f0fc; }
  .callout-important .callout-title { color: #7a3a9a; }
  .callout-warning   { border-color: #b37800; background: #fffbf0; }
  .callout-warning   .callout-title { color: #b37800; }
  .callout-caution   { border-color: #c03030; background: #fff0f0; }
  .callout-caution   .callout-title { color: #c03030; }
  .callout-info      { border-color: #0e7490; background: #ecfeff; }
  .callout-info      .callout-title { color: #0e7490; }
  .callout-todo      { border-color: #4f46e5; background: #eef2ff; }
  .callout-todo      .callout-title { color: #4f46e5; }
  .callout-abstract  { border-color: #0f766e; background: #f0fdfa; }
  .callout-abstract  .callout-title { color: #0f766e; }
  .callout-quote     { border-color: #57606a; background: #f6f8fa; }
  .callout-quote     .callout-title { color: #57606a; }
  .callout-success   { border-color: #15803d; background: #f0fdf4; }
  .callout-success   .callout-title { color: #15803d; }
  .callout-example   { border-color: #6d28d9; background: #f5f3ff; }
  .callout-example   .callout-title { color: #6d28d9; }
  .callout-question  { border-color: #a16207; background: #fefce8; }
  .callout-question  .callout-title { color: #a16207; }
  .callout-failure   { border-color: #c2410c; background: #fff7ed; }
  .callout-failure   .callout-title { color: #c2410c; }
  .callout-danger    { border-color: #b91c1c; background: #fef2f2; }
  .callout-danger    .callout-title { color: #b91c1c; }
  .callout-bug       { border-color: #be185d; background: #fdf2f8; }
  .callout-bug       .callout-title { color: #be185d; }

  /* Doc meta footer */
  .doc-meta { font-size: 0.78em; color: #888; border-top: 1px solid #eee; margin-top: 1.5em; padding-top: 0.4em; }

  .page-break { page-break-after: always; break-after: page; height: 0; }

  /* Mermaid diagrams (rendered client-side into SVG) */
  pre.mermaid { background: none; border-left: none; text-align: center; }

  /* DRAFT watermark */
  .draft-watermark {
    position: fixed;
    top: 40%;
    left: 50%;
    transform: translate(-50%, -50%) rotate(-30deg);
    font-size: 7em;
    font-weight: 800;
    letter-spacing: 0.2em;
    color: rgba(192, 48, 48, 0.12);
    pointer-events: none;
    user-select: none;
    z-index: 1000;
    -webkit-print-color-adjust: exact; print-color-adjust: exact;
  }

  /* Print */
  @media print {
    @page { margin: 0.6in 0.75in; }
    body { max-width: none; margin: 0; padding: 0; font-size: 9pt; font-family: 'Palatino Linotype', Palatino, 'Book Antiqua', Georgia, serif; line-height: 1.4; }
    h1, h2, h3 { font-family: Segoe UI, Calibri, Arial, sans-serif; }
    h1 { page-break-after: avoid; break-after: avoid; }
    h2 { page-break-after: avoid; break-after: avoid; margin-top: 1em; }
    h3 { page-break-after: avoid; break-after: avoid; }
    h2, h3 { orphans: 3; widows: 3; }
    p { orphans: 3; widows: 3; }
    li { page-break-inside: avoid; break-inside: avoid; }
    ul, ol { page-break-inside: avoid; break-inside: avoid; }
    blockquote { page-break-inside: avoid; break-inside: avoid; }
    pre { page-break-inside: avoid; break-inside: avoid; border-left: none; }
    table { page-break-inside: avoid; break-inside: avoid; }
    .callout { page-break-inside: avoid; break-inside: avoid; }
    h1 + *, h2 + *, h3 + * { page-break-before: avoid; break-before: avoid; }
    hr { border: none; margin: 0; height: 0; }
    a { text-decoration: none; color: inherit; }
    a[href^="http"]::after { content: " (" attr(href) ")"; font-size: 0.8em; color: #666; }
    thead tr { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    tbody tr:nth-child(even) td { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    .callout { -webkit-print-color-adjust: exact; print-color-adjust: exact; }
    nav#TOC { border: none; background: none; padding: 0; }
  }

  /* Dark mode (screen only — print stays light) */
  @media screen and (prefers-color-scheme: dark) {
    body { background: #0d1117; color: #c9d1d9; }
    h1 { color: #79b8e8; border-bottom-color: #2f5a80; }
    h2 { color: #79b8e8; border-bottom-color: #30363d; }
    h3 { color: #c9d1d9; }
    blockquote { background: #161b22; border-left-color: #2f5a80; }
    hr { border-top-color: #30363d; }
    code { background: #161b22; }
    pre { background: #161b22; border-left-color: #2f5a80; }
    a { color: #58a6ff; }
    .wiki-link-missing { color: #555; }
    kbd { color: #c9d1d9; background: #21262d; border-color: #444; border-bottom-color: #666; }
    thead tr { background-color: #1f3a55; }
    th { border-color: #263850; }
    td { border-color: #30363d; }
    tbody tr:nth-child(even) td { background-color: #161b22; }
    tbody tr:nth-child(odd)  td { background-color: #0d1117; }
    tbody tr:hover td { background-color: #1c2733; }
    nav#TOC { background: #161b22; border-color: #30363d; }
    nav#TOC p { color: #8b949e; }
    .doc-meta { color: #666; border-top-color: #30363d; }
    .draft-watermark { color: rgba(248, 81, 73, 0.14); }
    pre.mermaid { background: none; border-left: none; }

    .callout-note      { background: #0c2436; }
    .callout-note      .callout-title { color: #58a6ff; }
    .callout-info      { background: #082a31; }
    .callout-info      .callout-title { color: #22d3ee; }
    .callout-todo      { background: #1a1a3d; }
    .callout-todo      .callout-title { color: #818cf8; }
    .callout-abstract  { background: #082723; }
    .callout-abstract  .callout-title { color: #2dd4bf; }
    .callout-quote     { background: #1c2128; }
    .callout-quote     .callout-title { color: #9ea7b3; }
    .callout-tip       { background: #0e2a10; }
    .callout-tip       .callout-title { color: #56d364; }
    .callout-success   { background: #0a2916; }
    .callout-success   .callout-title { color: #3fb950; }
    .callout-important { background: #271036; }
    .callout-important .callout-title { color: #c084fc; }
    .callout-example   { background: #1e1236; }
    .callout-example   .callout-title { color: #a78bfa; }
    .callout-warning   { background: #2e2000; }
    .callout-warning   .callout-title { color: #e3b341; }
    .callout-question  { background: #2b2102; }
    .callout-question  .callout-title { color: #d4a72c; }
    .callout-caution   { background: #2e0f0f; }
    .callout-caution   .callout-title { color: #f47067; }
    .callout-failure   { background: #2b1205; }
    .callout-failure   .callout-title { color: #fb8f44; }
    .callout-danger    { background: #2d0b0b; }
    .callout-danger    .callout-title { color: #f85149; }
    .callout-bug       { background: #2b0a1a; }
    .callout-bug       .callout-title { color: #f778ba; }

    /* Syntax highlighting: override pandoc's light kate theme */
    div.sourceCode { background: #161b22; }
    code span { color: #c9d1d9; }
    code span.kw, code span.cf, code span.im { color: #c678dd; }
    code span.dt, code span.pp { color: #e5c07b; }
    code span.dv, code span.bn, code span.fl, code span.cn, code span.at { color: #d19a66; }
    code span.st, code span.ch, code span.sc, code span.ss, code span.vs { color: #98c379; }
    code span.co, code span.do, code span.an, code span.cv, code span.in { color: #8b949e; font-style: italic; }
    code span.fu { color: #61afef; }
    code span.va, code span.al, code span.er { color: #e06c75; }
    code span.op, code span.ot { color: #56b6c2; }
  }
</style>
